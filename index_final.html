<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VCU Managementsysteem — Solid Workforce B.V.</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
/* VCU Managementsysteem — Solid Workforce B.V. */
:root {
  --bg: #f4f4f1;
  --bg2: #fff;
  --bg3: #f0efeb;
  --border: rgba(0,0,0,.1);
  --border2: rgba(0,0,0,.18);
  --text: #1a1a18;
  --text2: #666;
  --text3: #aaa;
  --blue: #185FA5; --blue-bg: #E6F1FB; --blue-text: #0C447C;
  --green: #3B6D11; --green-bg: #EAF3DE; --green-text: #27500A;
  --amber: #BA7517; --amber-bg: #FAEEDA; --amber-text: #854F0B;
  --red: #A32D2D; --red-bg: #FCEBEB; --red-text: #791F1F;
  --purple: #534AB7; --purple-bg: #EEEDFE;
  --coral: #993C1D; --coral-bg: #FAECE7;
  --radius: 8px; --radius-lg: 12px;
  --shadow: 0 1px 4px rgba(0,0,0,.08);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; }

/* ── APP LAYOUT ── */
#app { display: flex; height: 100vh; overflow: hidden; }

/* ── SIDEBAR ── */
.sidebar { width: 230px; min-width: 230px; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
.logo { display: flex; align-items: center; gap: 10px; padding: 16px; border-bottom: 1px solid var(--border); }
.logo-icon { width: 36px; height: 36px; background: var(--blue); color: #fff; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.logo-name { font-size: 13px; font-weight: 600; }
.logo-sub { font-size: 10px; color: var(--text2); }
.nav { flex: 1; overflow-y: auto; padding: 8px 0; }
.nav-section { padding: 10px 14px 3px; font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; }
.nav-item { display: flex; align-items: center; gap: 8px; padding: 7px 12px; cursor: pointer; border-radius: 7px; margin: 1px 6px; font-size: 13px; color: var(--text2); text-decoration: none; transition: background .12s; }
.nav-item:hover { background: var(--bg3); color: var(--text); }
.nav-item.active { background: var(--blue-bg); color: var(--blue); font-weight: 500; }
.nav-item i { font-size: 16px; min-width: 16px; }
.badge { margin-left: auto; font-size: 10px; padding: 1px 6px; border-radius: 10px; font-weight: 600; }
.badge.danger { background: var(--red-bg); color: var(--red); }
.badge.amber { background: var(--amber-bg); color: var(--amber); }
.badge.blue { background: var(--blue-bg); color: var(--blue); }
.sidebar-footer { padding: 10px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 5px; }
.btn-export { display: flex; align-items: center; gap: 6px; padding: 6px 10px; border-radius: var(--radius); border: 1px solid var(--border2); background: none; color: var(--text2); cursor: pointer; font-size: 12px; transition: background .1s; }
.btn-export:hover { background: var(--bg3); }

/* ── MAIN ── */
.main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; min-width: 0; }

/* ── TOPBAR ── */
.topbar { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 12px 20px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; position: sticky; top: 0; z-index: 10; }
.topbar-title { font-size: 16px; font-weight: 600; flex: 1; }
.content { padding: 20px; }

/* ── BUTTONS ── */
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: var(--radius); border: 1px solid var(--border2); background: var(--bg2); color: var(--text); cursor: pointer; font-size: 13px; font-family: inherit; transition: background .1s; }
.btn:hover { background: var(--bg3); }
.btn-primary { background: var(--blue); color: #fff; border-color: var(--blue); }
.btn-primary:hover { background: var(--blue-text); }
.btn-success { background: var(--green); color: #fff; border-color: var(--green); }
.btn-success:hover { background: var(--green-text); }
.btn-danger { background: var(--red); color: #fff; border-color: var(--red); }
.btn-amber { background: var(--amber); color: #fff; border-color: var(--amber); }
.btn-sm { padding: 4px 10px; font-size: 12px; }
.btn-icon { display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 28px; border-radius: 6px; border: 1px solid var(--border); background: none; cursor: pointer; color: var(--text2); transition: background .1s; font-size: 14px; }
.btn-icon:hover { background: var(--bg3); }

/* ── CARDS ── */
.card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px 20px; margin-bottom: 16px; }
.card-title { font-size: 13px; font-weight: 600; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
.card-title i { font-size: 16px; color: var(--blue); }

/* ── STATS ── */
.stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 16px; }
.stat { background: var(--bg3); border-radius: var(--radius); padding: 14px 16px; }
.stat-label { font-size: 11px; color: var(--text2); margin-bottom: 5px; }
.stat-value { font-size: 26px; font-weight: 700; }
.stat-sub { font-size: 11px; color: var(--text2); margin-top: 3px; }
.stat.blue .stat-value { color: var(--blue); }
.stat.green .stat-value { color: var(--green); }
.stat.amber .stat-value { color: var(--amber); }
.stat.red .stat-value { color: var(--red); }

/* ── TABLES ── */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { text-align: left; padding: 8px 12px; font-size: 11px; font-weight: 600; color: var(--text2); border-bottom: 1px solid var(--border); text-transform: uppercase; letter-spacing: .04em; white-space: nowrap; }
td { padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--bg3); }

/* ── TAGS ── */
.tag { display: inline-flex; align-items: center; gap: 3px; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; white-space: nowrap; }
.tag-blue { background: var(--blue-bg); color: var(--blue-text); }
.tag-green { background: var(--green-bg); color: var(--green-text); }
.tag-amber { background: var(--amber-bg); color: var(--amber-text); }
.tag-red { background: var(--red-bg); color: var(--red-text); }
.tag-gray { background: var(--bg3); color: var(--text2); }
.tag-purple { background: var(--purple-bg); color: var(--purple); }
.tag-coral { background: var(--coral-bg); color: var(--coral); }

/* ── ALERTS ── */
.alert { padding: 10px 14px; border-radius: var(--radius); font-size: 13px; display: flex; align-items: flex-start; gap: 9px; margin-bottom: 14px; }
.alert i { flex-shrink: 0; font-size: 16px; margin-top: 1px; }
.alert-warn { background: var(--amber-bg); color: var(--amber-text); border: 1px solid #EF9F27; }
.alert-danger { background: var(--red-bg); color: var(--red-text); border: 1px solid #E24B4A; }
.alert-success { background: var(--green-bg); color: var(--green-text); border: 1px solid #97C459; }
.alert-info { background: var(--blue-bg); color: var(--blue-text); border: 1px solid #85B7EB; }

/* ── FORMS ── */
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-group { display: flex; flex-direction: column; gap: 4px; }
.form-group.full { grid-column: 1 / -1; }
.form-label { font-size: 12px; font-weight: 500; color: var(--text2); }
.form-input { padding: 8px 10px; border: 1px solid var(--border2); border-radius: var(--radius); background: var(--bg2); color: var(--text); font-size: 13px; font-family: inherit; width: 100%; }
.form-input:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 2px rgba(24,95,165,.15); }
select.form-input { cursor: pointer; }
textarea.form-input { resize: vertical; }

/* ── PROGRESS ── */
.pbar { background: var(--bg3); border-radius: 4px; height: 5px; overflow: hidden; }
.pfill { height: 100%; border-radius: 4px; transition: width .3s; }
.pbar-wrap { display: flex; align-items: center; gap: 6px; }
.pbar-wrap .pbar { flex: 1; }
.pbar-pct { font-size: 11px; min-width: 28px; }

/* ── AVATAR ── */
.avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; flex-shrink: 0; }

/* ── FASE TIMELINE ── */
.fase-timeline { display: flex; align-items: flex-start; margin: 12px 0; }
.fase-step { flex: 1; text-align: center; position: relative; }
.fase-step::before { content: ''; position: absolute; top: 13px; left: 50%; right: -50%; height: 2px; background: var(--border); z-index: 0; }
.fase-step:last-child::before { display: none; }
.fase-circle { width: 26px; height: 26px; border-radius: 50%; border: 2px solid var(--border2); background: var(--bg2); margin: 0 auto 5px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; position: relative; z-index: 1; }
.fase-circle.done { border-color: var(--green); background: var(--green); color: #fff; }
.fase-circle.active { border-color: var(--blue); background: var(--blue); color: #fff; }
.fase-label { font-size: 10px; color: var(--text2); line-height: 1.3; }

/* ── SIGNALERING ── */
.sig-item { border-left: 3px solid; padding: 10px 14px; margin-bottom: 10px; border-radius: 0 8px 8px 0; }
.sig-danger { border-color: #E24B4A; background: var(--red-bg); }
.sig-warn { border-color: #EF9F27; background: var(--amber-bg); }
.sig-info { border-color: #85B7EB; background: var(--blue-bg); }
.sig-title { font-size: 13px; font-weight: 600; margin-bottom: 3px; }
.sig-meta { font-size: 11px; color: var(--text2); display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

/* ── HANDTEKENING ── */
.sig-canvas-wrap { border: 2px dashed var(--border2); border-radius: var(--radius); background: #fafaf8; position: relative; }
#sig-canvas, #para-canvas { display: block; cursor: crosshair; touch-action: none; width: 100%; }
.canvas-controls { display: flex; gap: 8px; padding: 8px; border-top: 1px solid var(--border); align-items: center; }
.sig-preview { border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg3); min-height: 60px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
.sig-preview img { max-height: 55px; max-width: 100%; }

/* ── UPLOAD ZONE ── */
.upload-zone { border: 2px dashed var(--border2); border-radius: var(--radius); padding: 20px; text-align: center; cursor: pointer; color: var(--text2); transition: all .15s; }
.upload-zone:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-bg); }
.upload-zone.has-file { border-color: var(--green); background: var(--green-bg); color: var(--green); }
.upload-zone i { font-size: 28px; display: block; margin-bottom: 6px; }

/* ── BIJLAGE GRID ── */
.bijlage-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
.bijlage-card { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: var(--radius); border: 1px solid var(--border); cursor: pointer; transition: all .12s; }
.bijlage-card:hover { border-color: var(--blue); background: var(--blue-bg); }
.bijlage-card.done { border-color: #97C459; background: var(--green-bg); }
.bijlage-num { width: 28px; height: 28px; border-radius: 6px; background: var(--blue-bg); color: var(--blue); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; }
.bijlage-card.done .bijlage-num { background: var(--green); color: #fff; }

/* ── CERT CARD ── */
.cert-card { display: flex; align-items: center; gap: 12px; padding: 10px 14px; border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 8px; }
.cert-icon { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }

/* ── MODAL ── */
#modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 200; display: none; align-items: center; justify-content: center; }
#modal-overlay.open { display: flex; }
.modal { background: var(--bg2); border-radius: var(--radius-lg); padding: 24px; width: 580px; max-height: 88vh; overflow-y: auto; box-shadow: 0 8px 32px rgba(0,0,0,.18); }
.modal-hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.modal-title { font-size: 16px; font-weight: 700; }
.modal-close { background: none; border: none; cursor: pointer; font-size: 20px; color: var(--text2); padding: 2px; }

/* ── TOAST ── */
#toast { position: fixed; bottom: 24px; right: 24px; z-index: 999; padding: 10px 16px; border-radius: var(--radius); font-size: 13px; display: none; align-items: center; gap: 8px; max-width: 340px; box-shadow: var(--shadow); font-weight: 500; }

/* ── HANDBOEK TOC ── */
.hb-toc-item { padding: 5px 8px; font-size: 12px; cursor: pointer; border-radius: 5px; color: var(--text2); transition: background .1s; }
.hb-toc-item:hover { background: var(--bg3); color: var(--text); }
.hb-toc-item.active { background: var(--blue-bg); color: var(--blue); font-weight: 500; }

/* ── CHECKLIST ── */
.cl-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); }
.cl-item:last-child { border-bottom: none; }
.cl-check { width: 18px; height: 18px; border-radius: 4px; border: 2px solid var(--border2); display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; transition: background .1s; }
.cl-check.on { background: var(--green); border-color: var(--green); color: #fff; font-size: 12px; }

/* ── HELPERS ── */
.flex { display: flex; }
.ic { align-items: center; }
.gap1 { gap: 4px; }
.gap2 { gap: 8px; }
.gap3 { gap: 12px; }
.mla { margin-left: auto; }
.mt1 { margin-top: 4px; }
.mt2 { margin-top: 8px; }
.mt3 { margin-top: 14px; }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.hidden { display: none !important; }
.divider { height: 1px; background: var(--border); margin: 14px 0; }

/* ── PRINT ── */
@media print {
  .sidebar, .topbar, .btn, button { display: none !important; }
  .main { overflow: visible; }
  .card { break-inside: avoid; }
}

/* ══════════════════════════════════════════════════════
   BIJLAGEN FORMULIEREN
══════════════════════════════════════════════════════ */
.bijlage-form-wrap { max-height: 70vh; overflow-y: auto; padding-right: 4px; }
.bijlage-header { margin-bottom: 20px; padding-bottom: 14px; border-bottom: 2px solid var(--blue); }
.bijlage-header h2 { font-size: 18px; font-weight: 700; margin: 6px 0 4px; color: var(--blue); }
.bijlage-header p { font-size: 13px; color: var(--text2); }
.bijlage-badge { display: inline-block; background: var(--blue); color: #fff; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 4px; margin-bottom: 4px; }
.bf-section { margin-bottom: 20px; padding: 14px 16px; background: var(--bg3); border-radius: var(--radius); }
.bf-section-title { font-size: 12px; font-weight: 700; color: var(--blue); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 12px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }

/* JA / NEE knoppen */
.jn-row { display: flex; align-items: center; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid var(--border); gap: 8px; }
.jn-row:last-child { border-bottom: none; }
.jn-label { font-size: 13px; flex: 1; }
.jn-btns { display: flex; gap: 6px; flex-shrink: 0; }
.jn-btn { padding: 4px 14px; border-radius: 6px; border: 1px solid var(--border2); background: var(--bg2); cursor: pointer; font-size: 12px; font-weight: 500; color: var(--text2); transition: all .12s; }
.jn-btn:hover { background: var(--bg3); }
.jn-ja { background: var(--green) !important; color: #fff !important; border-color: var(--green) !important; }
.jn-nee { background: var(--red) !important; color: #fff !important; border-color: var(--red) !important; }

/* Sterren */
.ster-wrap { display: flex; gap: 3px; }
.ster { font-size: 22px; cursor: pointer; color: var(--border2); transition: color .1s; line-height: 1; }
.ster-on { color: #EF9F27; }
.ster:hover { color: #EF9F27; }

/* Handtekening velden */
.sig-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.sig-row-3 { grid-template-columns: 1fr 1fr 1fr; }
.sig-field-wrap { display: flex; flex-direction: column; gap: 6px; }
.sig-field-label { font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: .04em; }
.sig-field-img { max-height: 55px; max-width: 100%; border: 1px solid var(--border); border-radius: var(--radius); padding: 6px; background: #fff; }
.sig-field-empty { height: 55px; border: 1px dashed var(--border2); border-radius: var(--radius); display: flex; align-items: center; justify-content: center; font-size: 11px; color: var(--text3); background: var(--bg2); }
.sig-field-name { font-size: 12px; color: var(--text2); font-style: italic; }

/* Organogram */
.organogram { display: flex; flex-direction: column; align-items: center; gap: 0; padding: 16px 0; }
.org-box { background: var(--blue); color: #fff; padding: 10px 20px; border-radius: var(--radius); text-align: center; font-size: 13px; font-weight: 500; min-width: 150px; }
.org-box small { font-size: 11px; opacity: .8; }
.org-top { background: var(--blue-text); }
.org-bottom { background: var(--green); }
.org-line { width: 2px; height: 20px; background: var(--border2); }
.org-mid-row { display: flex; gap: 30px; }

/* Beleidsverklaring tekst */
.beleids-tekst { font-size: 13px; line-height: 1.8; color: var(--text2); padding: 14px; background: var(--bg2); border-radius: var(--radius); border-left: 3px solid var(--blue); }

/* Bijlagen grid klikbaar */
.bijlage-card { cursor: pointer; }
.bijlage-card:hover { transform: translateY(-1px); box-shadow: 0 2px 8px rgba(0,0,0,.08); }

/* ══════════════════════════════════════════════════════
   MOBILE RESPONSIVE
══════════════════════════════════════════════════════ */

/* Mobile hamburger */
.mob-menu-btn { display: none; background: none; border: none; font-size: 22px; cursor: pointer; color: var(--text); padding: 4px 8px; }
.mob-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 90; }
.mob-overlay.open { display: block; }

@media (max-width: 768px) {
  /* Layout */
  #app { flex-direction: column; }
  .sidebar { position: fixed; left: -240px; top: 0; bottom: 0; z-index: 100; transition: left .25s; box-shadow: 2px 0 12px rgba(0,0,0,.15); }
  .sidebar.open { left: 0; }
  .main { width: 100%; height: 100vh; }

  /* Topbar */
  .topbar { padding: 10px 14px; gap: 8px; flex-wrap: wrap; }
  .topbar-title { font-size: 14px; }
  .mob-menu-btn { display: flex; align-items: center; }

  /* Content */
  .content { padding: 12px; }

  /* Stats grid → 2 kolommen */
  .stats-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
  .stat-value { font-size: 20px; }

  /* Grid2 → 1 kolom */
  .grid2 { grid-template-columns: 1fr; gap: 12px; }
  .form-grid { grid-template-columns: 1fr; }
  .form-group.full { grid-column: 1; }

  /* Bijlagen grid → 1 kolom */
  .bijlage-grid { grid-template-columns: 1fr; }

  /* Sig row → 1 kolom */
  .sig-row, .sig-row-3 { grid-template-columns: 1fr; }

  /* Tabel scrollen */
  .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  table { min-width: 560px; font-size: 12px; }
  th, td { padding: 7px 8px; }

  /* Modal */
  .modal { width: calc(100vw - 24px); margin: 0 12px; padding: 16px; }
  .bijlage-form-wrap { max-height: 65vh; }

  /* Handboek */
  #hb-layout { flex-direction: column; }

  /* Buttons */
  .btn { font-size: 12px; padding: 6px 10px; }
  .topbar .flex { flex-wrap: wrap; gap: 6px; }

  /* Cards */
  .card { padding: 12px 14px; margin-bottom: 12px; }

  /* Fase timeline */
  .fase-timeline { gap: 0; }
  .fase-label { font-size: 9px; }

  /* JN rij op mobile */
  .jn-row { flex-wrap: wrap; gap: 6px; }
}

@media (max-width: 420px) {
  .stats-grid { grid-template-columns: 1fr; }
  .topbar-title { font-size: 13px; }
  .btn-sm { padding: 3px 8px; font-size: 11px; }
}

</style>
</head>
<body>

<div class="mob-overlay" id="mob-overlay" onclick="closeSidebar()"></div>

<div id="app">
  <aside class="sidebar" id="sidebar">
    <div class="logo">
      <div class="logo-icon"><i class="ti ti-shield-check"></i></div>
      <div>
        <div class="logo-name">Solid Workforce</div>
        <div class="logo-sub">VCU Systeem v2.0</div>
      </div>
    </div>
    <nav class="nav">
      <div class="nav-section">Overzicht</div>
      <a class="nav-item active" data-page="dashboard" onclick="closeSidebar()"><i class="ti ti-layout-dashboard"></i>Dashboard</a>

<script>
// ── HOOFD APP CONTROLLER ──

const App = {
  currentPage: 'dashboard',

  init() {
    DB.load();
    this.setupNav();
    this.navigate('dashboard');
    Signalering.checkAll();
    this.updateBadges();
  },

  setupNav() {
    document.querySelectorAll('.nav-item').forEach(el => {
      el.addEventListener('click', () => {
        const page = el.dataset.page;
        if (page) this.navigate(page);
      });
    });
  },

  navigate(page) {
    this.currentPage = page;
    document.querySelectorAll('.nav-item').forEach(el => {
      el.classList.toggle('active', el.dataset.page === page);
    });
    const main = document.getElementById('main-content');
    main.innerHTML = Pages[page] ? Pages[page]() : '<div class="content"><p>Pagina niet gevonden.</p></div>';
    if (typeof window[`init_${page}`] === 'function') window[`init_${page}`]();
    this.updateBadges();
  },

  updateBadges() {
    const sigs = DB.getSignaleringen(true).length;
    const expCerts = DB.getCertificaten().filter(c => {
      const dagen = daysDiff(c.geldigTot);
      return dagen <= DB.getInstellingen().sigDagen && dagen >= 0;
    }).length;
    document.getElementById('nb-sig').textContent = sigs;
    document.getElementById('nb-sig').style.display = sigs > 0 ? '' : 'none';
    document.getElementById('nb-mw').textContent = DB.getMedewerkers().length;
    document.getElementById('nb-cert').textContent = expCerts;
    document.getElementById('nb-cert').style.display = expCerts > 0 ? '' : 'none';
  },

  exportData() {
    DB.exportJSON();
    Toast.show('Data opgeslagen als JSON-bestand', 'success');
  },

  importData() {
    document.getElementById('import-file').click();
  },

  handleImport(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      if (DB.importJSON(ev.target.result)) {
        Toast.show('Data geladen!', 'success');
        this.navigate(this.currentPage);
        this.updateBadges();
      } else {
        Toast.show('Ongeldig bestand', 'danger');
      }
    };
    reader.readAsText(file);
    e.target.value = '';
  }
};

// ── TOAST ──
const Toast = {
  timer: null,
  show(msg, type='info') {
    const el = document.getElementById('toast');
    const styles = {
      success: { bg: '#EAF3DE', color: '#27500A', icon: 'ti-check' },
      danger:  { bg: '#FCEBEB', color: '#791F1F', icon: 'ti-alert-triangle' },
      warn:    { bg: '#FAEEDA', color: '#854F0B', icon: 'ti-alert-triangle' },
      info:    { bg: '#E6F1FB', color: '#0C447C', icon: 'ti-info-circle' }
    };
    const s = styles[type] || styles.info;
    el.style.background = s.bg;
    el.style.color = s.color;
    el.style.border = `1px solid ${s.color}`;
    el.innerHTML = `<i class="ti ${s.icon}"></i>${msg}`;
    el.style.display = 'flex';
    clearTimeout(this.timer);
    this.timer = setTimeout(() => el.style.display = 'none', 3500);
  }
};

// ── HULPFUNCTIES ──
function H(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function daysDiff(dateStr) {
  if (!dateStr) return 9999;
  const d = new Date(dateStr);
  const now = new Date();
  now.setHours(0,0,0,0);
  return Math.round((d - now) / 86400000);
}

function formatDate(str) {
  if (!str) return '—';
  const d = new Date(str);
  return `${String(d.getDate()).padStart(2,'0')}-${String(d.getMonth()+1).padStart(2,'0')}-${d.getFullYear()}`;
}

function wekenGewerkt(startStr) {
  if (!startStr) return 0;
  return Math.floor((new Date() - new Date(startStr)) / (7 * 86400000));
}

function mwNaam(mw) { return mw ? `${mw.voornaam} ${mw.achternaam}` : '—'; }

function mwAvatar(mw, size=32) {
  const initials = (mw.voornaam[0]||'') + (mw.achternaam[0]||'');
  const colors = [
    ['#E6F1FB','#185FA5'],['#FAEEDA','#BA7517'],['#EAF3DE','#3B6D11'],
    ['#EEEDFE','#534AB7'],['#FAECE7','#993C1D'],['#FCEBEB','#A32D2D']
  ];
  const [bg,fg] = colors[mw.id % colors.length];
  return `<div class="avatar" style="width:${size}px;height:${size}px;background:${bg};color:${fg};">${initials}</div>`;
}

function faseTag(mw) {
  if (mw.cat === 'Eigen') return '<span class="tag tag-green">Eigen personeel</span>';
  if (mw.cat === 'ZZP') return '<span class="tag tag-coral">ZZP</span>';
  if (mw.cat === 'Onderaannemer') return '<span class="tag tag-gray">Onderaannemer</span>';
  const map = {1:['tag-green','Fase 1'],2:['tag-amber','Fase 2'],3:['tag-blue','Fase 3'],4:['tag-purple','Fase 4']};
  const [cls,lbl] = map[mw.fase] || ['tag-gray','?'];
  return `<span class="tag ${cls}">${lbl}</span>`;
}

function pbarHtml(pct) {
  const c = pct===100?'#639922':pct>=60?'#EF9F27':'#E24B4A';
  return `<div class="pbar-wrap"><div class="pbar" style="flex:1;"><div class="pfill" style="width:${pct}%;background:${c};"></div></div><span class="pbar-pct">${pct}%</span></div>`;
}

function certStatusTag(cert) {
  const d = daysDiff(cert.geldigTot);
  if (d < 0) return '<span class="tag tag-red">Verlopen</span>';
  if (d <= 30) return `<span class="tag tag-red">Verloopt over ${d}d</span>`;
  if (d <= 90) return `<span class="tag tag-amber">Verloopt over ${d}d</span>`;
  return '<span class="tag tag-green">Geldig</span>';
}

// Init
document.addEventListener('DOMContentLoaded', () => App.init());

// ── GLOBALE BIJLAGE FUNCTIES ──
let _currentBijlageMwId = 0;
let _currentBijlageNr = 0;
let _currentBijlageData = {};

function openBijlageFormulier(mwId, nr) {
  _currentBijlageMwId = mwId;
  _currentBijlageNr = nr;
  const bestaand = DB.getBijlage(mwId, nr);
  _currentBijlageData = bestaand.data ? {...bestaand.data} : {};

  const mw = DB.getMedewerker(mwId);
  const html = BijlagenForms.render(nr, mwId);

  document.getElementById('modal-box').innerHTML = `
    <div class="modal-hdr">
      <div class="modal-title">${BIJLAGEN[nr-1]}</div>
      <button class="modal-close" onclick="Modal.close()"><i class="ti ti-x"></i></button>
    </div>
    <div class="bijlage-form-wrap">${html}</div>
    <div class="flex gap2 mt3" style="justify-content:flex-end;flex-wrap:wrap;">
      <button class="btn" onclick="Print.bijlage(${mwId},${nr})"><i class="ti ti-printer"></i>Afdrukken</button>
      <button class="btn" onclick="Modal.close()">Annuleren</button>
      <button class="btn btn-primary" onclick="slaanBijlageOp()"><i class="ti ti-check"></i>Opslaan als compleet</button>
    </div>`;
  document.getElementById('modal-overlay').classList.add('open');
}

function setBF(key, val) {
  _currentBijlageData[key] = val;
}

function setJN(id, val, btn) {
  _currentBijlageData[id] = val;
  const wrap = btn.closest('.jn-btns');
  wrap.querySelectorAll('.jn-btn').forEach(b => b.classList.remove('jn-ja','jn-nee'));
  btn.classList.add(val ? 'jn-ja' : 'jn-nee');
}

function setSter(id, val, wrap) {
  _currentBijlageData[id] = val;
  wrap.querySelectorAll('.ster').forEach((s,i) => s.classList.toggle('ster-on', i < val));
}

function slaanBijlageOp() {
  DB.saveBijlage(_currentBijlageMwId, _currentBijlageNr, {
    compleet: true,
    data: _currentBijlageData
  });
  Modal.close();
  Toast.show(`Bijlage ${_currentBijlageNr} opgeslagen als compleet`, 'success');
  App.updateBadges();
  // Herlaad huidige pagina
  if (App.currentPage === 'bijlagen') renderBijlagenGrid(_currentBijlageMwId);
  if (App.currentPage === 'dossier') loadDossier(_currentBijlageMwId);
}

  _mobBtn() {
    return `<button class="mob-menu-btn" onclick="openSidebar()"><i class="ti ti-menu-2"></i></button>`;
  },

  dashboard() {
    const mws = DB.getMedewerkers();
    const sigs = DB.getSignaleringen(true);
    const openInc = DB.getIncidenten().filter(i=>i.status==='Open').length;
    const expCerts = DB.getCertificaten().filter(c=>daysDiff(c.geldigTot)<=30&&daysDiff(c.geldigTot)>=0);
    const compliant = mws.filter(m=>DB.dossierCompletie(m.id)===100&&m.heeftHandtekening).length;

    const alertsHtml = [
      expCerts.length ? `<div class="alert alert-danger"><i class="ti ti-certificate"></i><div><strong>${expCerts.length} certificaat/diploma verloopt binnen 30 dagen.</strong> Bekijk de certificaten pagina.</div></div>` : '',
      mws.filter(m=>!m.heeftHandtekening).length ? `<div class="alert alert-warn"><i class="ti ti-signature"></i>Medewerkers zonder handtekening: ${mws.filter(m=>!m.heeftHandtekening).map(m=>mwNaam(m)).join(', ')}</div>` : '',
      sigs.filter(s=>s.urgentie==='Kritiek').length ? `<div class="alert alert-danger"><i class="ti ti-bell"></i>${sigs.filter(s=>s.urgentie==='Kritiek').length} kritieke signalering(en) vereisen directe actie.</div>` : ''
    ].filter(Boolean).join('');

    const mwRows = mws.slice(0,5).map(mw => {
      const pct = DB.dossierCompletie(mw.id);
      const inlener = DB.getInlener(mw.inlenerId);
      return `<tr>
        <td><div class="flex ic gap2">${mwAvatar(mw)}<span>${H(mwNaam(mw))}</span></div></td>
        <td>${faseTag(mw)}</td>
        <td style="font-size:12px;">${H(inlener?.naam||'—')}</td>
        <td style="min-width:100px;">${pbarHtml(pct)}</td>
        <td>${pct===100&&mw.heeftHandtekening?'<span class="tag tag-green">Compliant</span>':'<span class="tag tag-amber">Onvolledig</span>'}</td>
        <td><button class="btn-icon" onclick="App.navigate('dossier');setTimeout(()=>loadDossier(${mw.id}),100)" title="Dossier"><i class="ti ti-folder-open"></i></button></td>
      </tr>`;
    }).join('');

    return `
    <div class="topbar">${this._mobBtn()}<div class="topbar-title">Dashboard</div>
      <div class="flex gap2">
        <button class="btn" onclick="App.navigate('rapporten')"><i class="ti ti-printer"></i>Afdrukken</button>
        <button class="btn btn-primary" onclick="Modal.nieuwMedewerker()"><i class="ti ti-plus"></i>Nieuwe medewerker</button>
      </div>
    </div>
    <div class="content">
      ${alertsHtml}
      <div class="stats-grid">
        <div class="stat blue"><div class="stat-label">Medewerkers actief</div><div class="stat-value">${mws.length}</div><div class="stat-sub">${mws.filter(m=>m.cat==='Uitzend').length} uitzend · ${mws.filter(m=>m.cat==='Eigen').length} eigen</div></div>
        <div class="stat green"><div class="stat-label">VCU Compliant</div><div class="stat-value">${compliant}</div><div class="stat-sub">Dossier 100% + handtekening</div></div>
        <div class="stat amber"><div class="stat-label">Open signaleringen</div><div class="stat-value">${sigs.length}</div><div class="stat-sub">Actief openstaand</div></div>
        <div class="stat red"><div class="stat-label">Open incidenten</div><div class="stat-value">${openInc}</div><div class="stat-sub">Vereisen opvolging</div></div>
      </div>
      <div class="grid2">
        <div class="card">
          <div class="card-title"><i class="ti ti-bell"></i>Recente signaleringen</div>
          ${sigs.slice(0,3).map(s=>`<div class="sig-item ${s.urgentie==='Kritiek'?'sig-danger':'sig-warn'}">
            <div class="sig-title">${H(s.omschrijving)}</div>
            <div class="sig-meta"><span>${H(s.medewerker)}</span><span class="tag ${s.urgentie==='Kritiek'?'tag-red':'tag-amber'}">${s.urgentie}</span></div>
          </div>`).join('') || '<p style="color:var(--text2);font-size:13px;">Geen openstaande signaleringen.</p>'}
          ${sigs.length>0?`<button class="btn btn-sm" onclick="App.navigate('signalering')">Alle signaleringen →</button>`:''}
        </div>
        <div class="card">
          <div class="card-title"><i class="ti ti-certificate"></i>Certificaten status</div>
          ${DB.getCertificaten().filter(c=>daysDiff(c.geldigTot)<=90).slice(0,4).map(c=>{
            const mw = DB.getMedewerker(c.mwId);
            return `<div class="flex ic gap2" style="margin-bottom:8px;font-size:13px;">
              ${mwAvatar(mw,26)}<div style="flex:1;">${H(mwNaam(mw))} — ${H(c.naam)}</div>${certStatusTag(c)}
            </div>`;
          }).join('') || '<p style="color:var(--text2);font-size:13px;">Alle certificaten actueel.</p>'}
        </div>
      </div>
      <div class="card">
        <div class="card-title"><i class="ti ti-users"></i>Medewerkers overzicht</div>
        <div class="table-wrap"><table>
          <thead><tr><th>Naam</th><th>Categorie/Fase</th><th>Opdrachtgever</th><th>Dossier</th><th>Status</th><th></th></tr></thead>
          <tbody>${mwRows}</tbody>
        </table></div>
      </div>
    </div>`;
  },

  // ════════════════ SIGNALERINGEN ════════════════
  signalering() {
    const sigs = DB.getSignaleringen(false);
    const open = sigs.filter(s=>s.status==='Open');
    const afg = sigs.filter(s=>s.status==='Afgehandeld');
    const inst = DB.getInstellingen();
    return `
    <div class="topbar">${this._mobBtn()}<div class="topbar-title">Signaleringen</div></div>
    <div class="content">
      <div class="card">
        <div class="card-title"><i class="ti ti-settings"></i>Signaleringsinstellingen</div>
        <div class="flex ic gap3" style="flex-wrap:wrap;font-size:13px;">
          <span style="color:var(--text2);">Waarschuw</span>
          <select class="form-input" style="width:120px;" id="inst-dagen" onchange="saveInstelling('sigDagen',parseInt(this.value))">
            <option value="30" ${inst.sigDagen==30?'selected':''}>30 dagen</option>
            <option value="60" ${inst.sigDagen==60?'selected':''}>60 dagen</option>
            <option value="90" ${inst.sigDagen==90?'selected':''}>90 dagen</option>
          </select>
          <span style="color:var(--text2);">van tevoren · Kanalen:</span>
          <label class="flex ic gap1"><input type="checkbox" ${inst.sigSysteem?'checked':''} onchange="saveInstelling('sigSysteem',this.checked)"> Systeem</label>
          <label class="flex ic gap1"><input type="checkbox" ${inst.sigEmail?'checked':''} onchange="saveInstelling('sigEmail',this.checked)"> E-mail</label>
          <label class="flex ic gap1"><input type="checkbox" ${inst.sigWhatsapp?'checked':''} onchange="saveInstelling('sigWhatsapp',this.checked)"> WhatsApp</label>
          <button class="btn btn-sm btn-primary" onclick="Signalering.checkAll();App.navigate('signalering')"><i class="ti ti-refresh"></i>Hercontroleren</button>
        </div>
      </div>
      <div class="card">
        <div class="card-title"><i class="ti ti-alert-triangle"></i>Openstaand (${open.length})</div>
        ${open.length===0?'<p style="color:var(--text2);font-size:13px;">Geen openstaande signaleringen.</p>':''}
        <div class="table-wrap"><table>
          <thead><tr><th>Type</th><th>Medewerker</th><th>Omschrijving</th><th>Urgentie</th><th>Datum</th><th></th></tr></thead>
          <tbody>${open.map(s=>`<tr>
            <td><span class="tag tag-blue">${H(s.type)}</span></td>
            <td>${H(s.medewerker)}</td>
            <td style="font-size:12px;">${H(s.omschrijving)}</td>
            <td>${s.urgentie==='Kritiek'?'<span class="tag tag-red">Kritiek</span>':'<span class="tag tag-amber">Waarschuwing</span>'}</td>
            <td style="font-size:12px;">${formatDate(s.datum)}</td>
            <td><button class="btn-icon" onclick="DB.afhandelSignalering(${s.id});App.navigate('signalering')" title="Afhandelen"><i class="ti ti-check"></i></button></td>
          </tr>`).join('')}
          </tbody>
        </table></div>
      </div>
      ${afg.length?`<div class="card">
        <div class="card-title"><i class="ti ti-history"></i>Afgehandeld (${afg.length})</div>
        <div class="table-wrap"><table>
          <thead><tr><th>Type</th><th>Medewerker</th><th>Omschrijving</th><th>Afgehandeld</th></tr></thead>
          <tbody>${afg.map(s=>`<tr>
            <td><span class="tag tag-green">${H(s.type)}</span></td><td>${H(s.medewerker)}</td>
            <td style="font-size:12px;">${H(s.omschrijving)}</td><td style="font-size:12px;">${formatDate(s.afgehandeld)}</td>
          </tr>`).join('')}</tbody>
        </table></div>
      </div>`:''}
    </div>`;
  },

  // ════════════════ MEDEWERKERS ════════════════
  medewerkers() {
    const mws = DB.getMedewerkers();
    return `
    <div class="topbar">${this._mobBtn()}<div class="topbar-title">Medewerkers</div>
      <div class="flex gap2 ic">
        <input type="text" class="form-input" style="width:180px;" placeholder="Zoeken..." oninput="filterMw(this.value)">
        <select class="form-input" style="width:140px;" onchange="filterMwCat(this.value)">
          <option value="">Alle categorieën</option>
          <option>Eigen</option><option>Uitzend</option><option>ZZP</option><option>Onderaannemer</option>
        </select>
        <button class="btn btn-primary" onclick="Modal.nieuwMedewerker()"><i class="ti ti-plus"></i>Nieuw</button>
      </div>
    </div>
    <div class="content">
      <div class="card">
        <div class="table-wrap"><table id="mw-table">
          <thead><tr><th>Naam</th><th>Categorie</th><th>Fase</th><th>Start</th><th>Opdrachtgever</th><th>Handtek.</th><th>Dossier</th><th>Acties</th></tr></thead>
          <tbody id="mw-tbody">${renderMwTbody(mws)}</tbody>
        </table></div>
      </div>
    </div>`;
  },

  // ════════════════ DOSSIER ════════════════
  dossier() {
    const mws = DB.getMedewerkers();
    const opts = mws.map(m=>`<option value="${m.id}">${H(mwNaam(m))}</option>`).join('');
    return `
    <div class="topbar">${this._mobBtn()}<div class="topbar-title">Personeelsdossier</div>
      <div class="flex gap2">
        <select class="form-input" id="dossier-select" style="width:200px;" onchange="loadDossier(parseInt(this.value))">
          <option value="">— Selecteer medewerker —</option>${opts}
        </select>
        <button class="btn" onclick="Print.dossier()"><i class="ti ti-printer"></i>Afdrukken</button>
        <button class="btn btn-success" onclick="Print.dossierPDF()"><i class="ti ti-file-type-pdf"></i>PDF</button>
      </div>
    </div>
    <div class="content" id="dossier-content">
      <div class="alert alert-info"><i class="ti ti-info-circle"></i>Selecteer een medewerker om het dossier te bekijken.</div>
    </div>`;
  },

  // ════════════════ HANDTEKENING ════════════════
  handtekening() {
    const mws = DB.getMedewerkers();
    const opts = mws.map(m=>`<option value="${m.id}">${H(mwNaam(m))}</option>`).join('');
    return `
    <div class="topbar">${this._mobBtn()}<div class="topbar-title">Handtekening & Paraaf</div></div>
    <div class="content">
      <div class="alert alert-info"><i class="ti ti-info-circle"></i>Eenmalig instellen per medewerker. Wordt automatisch overgenomen in alle 16 bijlagen en formulieren.</div>
      <div class="flex ic gap3" style="margin-bottom:16px;">
        <label class="form-label" style="margin:0;">Medewerker:</label>
        <select class="form-input" style="width:220px;" id="sig-mw-select" onchange="loadSigStatus(parseInt(this.value))">
          <option value="">— Selecteer —</option>${opts}
        </select>
      </div>
      <div id="sig-status"></div>
      <div class="grid2">
        <div class="card">
          <div class="card-title"><i class="ti ti-signature"></i>Handtekening</div>
          <div class="flex gap2" style="margin-bottom:10px;">
            <button class="btn btn-sm active" onclick="switchTab('hand','teken')"><i class="ti ti-pencil"></i>Tekenen</button>
            <button class="btn btn-sm" onclick="switchTab('hand','upload')"><i class="ti ti-upload"></i>Uploaden</button>
          </div>
          <div id="hand-teken">
            <div class="sig-canvas-wrap">
              <canvas id="sig-canvas" height="130"></canvas>
              <div class="canvas-controls">
                <button class="btn btn-sm" onclick="clearCanvas('sig-canvas')"><i class="ti ti-trash"></i>Wissen</button>
                <select class="form-input" style="width:80px;font-size:12px;" id="sig-color"><option value="#111">Zwart</option><option value="#185FA5">Blauw</option></select>
                <button class="btn btn-sm btn-primary mla" onclick="saveFromCanvas('hand')"><i class="ti ti-check"></i>Opslaan</button>
              </div>
            </div>
          </div>
          <div id="hand-upload" class="hidden">
            <div class="upload-zone" id="hand-upload-zone" onclick="document.getElementById('hand-file').click()">
              <i class="ti ti-upload"></i><div>Klik of sleep afbeelding hier</div><div style="font-size:11px;margin-top:4px;">PNG of JPG — witte achtergrond</div>
            </div>
            <input type="file" id="hand-file" accept="image/*" class="hidden" onchange="handleSigUpload('hand',event)">
          </div>
          <div id="hand-preview" class="hidden mt2">
            <div class="form-label mb-1">Opgeslagen handtekening:</div>
            <div class="sig-preview"><img id="hand-img" src=""></div>
            <div class="alert alert-success mt2" style="margin-bottom:0;"><i class="ti ti-check"></i>Handtekening opgeslagen</div>
          </div>
        </div>
        <div class="card">
          <div class="card-title"><i class="ti ti-writing"></i>Paraaf</div>
          <div class="flex gap2" style="margin-bottom:10px;">
            <button class="btn btn-sm" onclick="switchTab('para','teken')"><i class="ti ti-pencil"></i>Tekenen</button>
            <button class="btn btn-sm" onclick="switchTab('para','upload')"><i class="ti ti-upload"></i>Uploaden</button>
          </div>
          <div id="para-teken">
            <div class="sig-canvas-wrap">
              <canvas id="para-canvas" height="130"></canvas>
              <div class="canvas-controls">
                <button class="btn btn-sm" onclick="clearCanvas('para-canvas')"><i class="ti ti-trash"></i>Wissen</button>
                <select class="form-input" style="width:80px;font-size:12px;" id="para-color"><option value="#111">Zwart</option><option value="#185FA5">Blauw</option></select>
                <button class="btn btn-sm btn-primary mla" onclick="saveFromCanvas('para')"><i class="ti ti-check"></i>Opslaan</button>
              </div>
            </div>
          </div>
          <div id="para-upload" class="hidden">
            <div class="upload-zone" id="para-upload-zone" onclick="document.getElementById('para-file').click()">
              <i class="ti ti-upload"></i><div>Klik of sleep afbeelding hier</div>
            </div>
            <input type="file" id="para-file" accept="image/*" class="hidden" onchange="handleSigUpload('para',event)">
          </div>
          <div id="para-preview" class="hidden mt2">
            <div class="form-label">Opgeslagen paraaf:</div>
            <div class="sig-preview"><img id="para-img" src=""></div>
            <div class="alert alert-success mt2" style="margin-bottom:0;"><i class="ti ti-check"></i>Paraaf opgeslagen</div>
          </div>
        </div>
      </div>
      <div class="card">
        <div class="card-title"><i class="ti ti-files"></i>Automatisch toegepast in</div>
        <div class="grid2" style="font-size:13px;">
          <div style="display:flex;flex-direction:column;gap:6px;">${BIJLAGEN.slice(7,12).map(b=>`<div class="flex ic gap2"><i class="ti ti-check" style="color:var(--green);"></i>${b}</div>`).join('')}</div>
          <div style="display:flex;flex-direction:column;gap:6px;">${BIJLAGEN.slice(12).map(b=>`<div class="flex ic gap2"><i class="ti ti-check" style="color:var(--green);"></i>${b}</div>`).join('')}</div>
        </div>
      </div>
    </div>`;
  },

  // ════════════════ BIJLAGEN ════════════════
  bijlagen() {
    const mws = DB.getMedewerkers();
    const opts = mws.map(m=>`<option value="${m.id}">${H(mwNaam(m))}</option>`).join('');
    return `
    <div class="topbar">${this._mobBtn()}<div class="topbar-title">16 VCU Bijlagen</div>
      <select class="form-input" id="bijlage-mw-sel" style="width:220px;" onchange="renderBijlagenGrid(parseInt(this.value))">
        <option value="">— Selecteer medewerker —</option>${opts}
      </select>
    </div>
    <div class="content">
      <div class="card">
        <div class="card-title"><i class="ti ti-files"></i>Bijlagenstatus</div>
        <div id="bijlage-grid" class="bijlage-grid">${renderBijlagenPlaceholder()}</div>
      </div>
    </div>`;
  },

  // ════════════════ CERTIFICATEN ════════════════
  certificaten() {
    const mws = DB.getMedewerkers();
    const opts = mws.map(m=>`<option value="${m.id}">${H(mwNaam(m))}</option>`).join('');
    const allCerts = DB.getCertificaten();
    return `
    <div class="topbar">${this._mobBtn()}<div class="topbar-title">Certificaten & VCA</div>
      <div class="flex gap2">
        <select class="form-input" id="cert-mw-sel" style="width:200px;" onchange="renderCertDetail(parseInt(this.value))">
          <option value="">— Medewerker —</option>${opts}
        </select>
        <button class="btn btn-primary" onclick="Modal.nieuwCertificaat()"><i class="ti ti-plus"></i>Toevoegen</button>
      </div>
    </div>
    <div class="content">
      <div class="grid2">
        <div class="card">
          <div class="card-title"><i class="ti ti-certificate"></i>VCA-vereisten per categorie</div>
          ${[['Uitzendkracht','VCA Basis','tag-green'],['Eigen personeel','VCA VOL','tag-blue'],['ZZP','VCA Basis + VCA VOL','tag-coral'],['Onderaannemer','VCA Basis','tag-gray']].map(([cat,vereist,cls])=>`
          <div class="cert-card"><div class="cert-icon" style="background:var(--blue-bg);color:var(--blue);"><i class="ti ti-certificate"></i></div>
            <div style="flex:1;"><div style="font-size:13px;font-weight:600;">${cat}</div><div style="font-size:11px;color:var(--text2);">${vereist}</div></div>
            <span class="tag ${cls}">${vereist}</span></div>`).join('')}
        </div>
        <div class="card">
          <div class="card-title"><i class="ti ti-users"></i>Status per medewerker</div>
          ${mws.map(mw=>{
            const certs = DB.getCertificaten(mw.id);
            const exp = certs.filter(c=>daysDiff(c.geldigTot)<=30&&daysDiff(c.geldigTot)>=0);
            return `<div class="cert-card" style="cursor:pointer;" onclick="document.getElementById('cert-mw-sel').value=${mw.id};renderCertDetail(${mw.id})">
              ${mwAvatar(mw,30)}<div style="flex:1;min-width:0;"><div style="font-size:13px;font-weight:500;">${H(mwNaam(mw))}</div>
              <div style="font-size:11px;color:var(--text2);">${certs.length} certificaat/diploma('s)</div></div>
              ${exp.length?'<span class="tag tag-red">Let op</span>':certs.length===0?'<span class="tag tag-gray">Geen</span>':'<span class="tag tag-green">OK</span>'}
            </div>`;
          }).join('')}
        </div>
      </div>
      <div id="cert-detail"></div>
    </div>`;
  },

  // ════════════════ INCIDENTEN ════════════════
  incidenten() {
    const incs = DB.getIncidenten();
    return `
    <div class="topbar">${this._mobBtn()}<div class="topbar-title">Incidenten & Bijna-Ongevallen</div>
      <button class="btn btn-primary" onclick="Modal.nieuwIncident()"><i class="ti ti-plus"></i>Melden</button>
    </div>
    <div class="content">
      <div class="card">
        <div class="table-wrap"><table>
          <thead><tr><th>Datum</th><th>Type</th><th>Medewerker</th><th>Locatie</th><th>Omschrijving</th><th>Status</th><th>Acties</th></tr></thead>
          <tbody>${incs.map(inc=>{
            const mw = DB.getMedewerker(inc.mwId);
            return `<tr>
              <td>${formatDate(inc.datum)}</td>
              <td><span class="tag ${inc.type==='Bedrijfsongeval'?'tag-red':inc.type==='Bijna-ongeval'?'tag-amber':'tag-blue'}">${H(inc.type)}</span></td>
              <td>${H(mwNaam(mw))}</td>
              <td style="font-size:12px;">${H(inc.locatie||'—')}</td>
              <td style="font-size:12px;max-width:200px;">${H((inc.beschrijving||'').slice(0,60))}${inc.beschrijving?.length>60?'…':''}</td>
              <td>${inc.status==='Open'?'<span class="tag tag-amber">Open</span>':inc.status==='Afgehandeld'?'<span class="tag tag-green">Afgehandeld</span>':'<span class="tag tag-blue">In behandeling</span>'}</td>
              <td class="flex gap1">
                <button class="btn-icon" onclick="Modal.bekijkIncident(${inc.id})" title="Bekijken"><i class="ti ti-eye"></i></button>
                ${inc.status==='Open'?`<button class="btn-icon" onclick="sluitIncident(${inc.id})" title="Afhandelen"><i class="ti ti-check"></i></button>`:''}
              </td>
            </tr>`;
          }).join('')}</tbody>
        </table></div>
      </div>
    </div>`;
  },

  // ════════════════ EVALUATIES ════════════════
  evaluaties() {
    const evs = DB.getEvaluaties();
    return `
    <div class="topbar">${this._mobBtn()}<div class="topbar-title">Evaluaties</div>
      <button class="btn btn-primary" onclick="Modal.nieuweEvaluatie()"><i class="ti ti-plus"></i>Nieuwe evaluatie</button>
    </div>
    <div class="content">
      <div class="card">
        <div class="table-wrap"><table>
          <thead><tr><th>Datum</th><th>Medewerker</th><th>Inlener</th><th>Veiligheid</th><th>Kwaliteit</th><th>Conclusie</th></tr></thead>
          <tbody>${evs.map(ev=>{
            const mw = DB.getMedewerker(ev.mwId);
            const il = DB.getInlener(ev.inlenerId);
            const sterren = n => '⭐'.repeat(Math.min(5,Math.max(0,n||0)));
            return `<tr>
              <td>${formatDate(ev.datum)}</td>
              <td>${H(mwNaam(mw))}</td>
              <td>${H(il?.naam||'—')}</td>
              <td>${sterren(ev.scoreVeiligheid)}</td>
              <td>${sterren(ev.scoreKwaliteit)}</td>
              <td>${ev.inlenerTevreden?'<span class="tag tag-green">Tevreden</span>':'<span class="tag tag-amber">Verbeterpunten</span>'}</td>
            </tr>`;
          }).join('')}</tbody>
        </table></div>
      </div>

function loadDossier(id) {

    <div class="divider"></div>

  const sigHtml = ht ? `<div class="flex gap3">
    <div><div class="form-label">Handtekening</div><div class="sig-preview" style="width:160px;height:50px;"><img src="${ht.hand}" style="max-height:46px;"></div></div>
    <div><div class="form-label">Paraaf</div><div class="sig-preview" style="width:80px;height:50px;"><img src="${ht.paraaf||ht.hand}" style="max-height:46px;"></div></div>
  </div>` : `<div class="alert alert-warn"><i class="ti ti-alert-triangle"></i>Geen handtekening — <button class="btn btn-sm mla" onclick="App.navigate('handtekening');setTimeout(()=>{document.getElementById('sig-mw-select').value=${id};loadSigStatus(${id});},100)">Nu instellen</button></div>`;

      ${b.compleet?`<span class="tag tag-green" style="font-size:10px;">${formatDate(b.datum)}</span>`:'<span class="tag tag-amber" style="font-size:10px;">Ontbreekt</span>'}
    </div>`;
  }).join('');

  cont.innerHTML = `
    <div class="flex gap2" style="margin-bottom:14px;">
      <button class="btn" onclick="Print.dossierById(${id})"><i class="ti ti-printer"></i>Print dossier</button>
      <button class="btn btn-success" onclick="Print.dossierPDFById(${id})"><i class="ti ti-file-type-pdf"></i>PDF export</button>
      <button class="btn btn-primary mla" onclick="Modal.nieuwCertificaat(${id})"><i class="ti ti-plus"></i>Certificaat toevoegen</button>
    </div>
    <div class="card">
      <div class="card-title"><i class="ti ti-user"></i>${H(mwNaam(mw))} — Personeelsdossier</div>
      <div class="form-grid">
        <div><div class="form-label">Naam</div><div style="font-size:13px;">${H(mwNaam(mw))}</div></div>
        <div><div class="form-label">BSN</div><div style="font-size:13px;">${H(mw.bsn||'—')}</div></div>

        <div><div class="form-label">Startdatum</div><div style="font-size:13px;">${formatDate(mw.start)}</div></div>
        <div><div class="form-label">Opdrachtgever</div><div style="font-size:13px;">${H(il?.naam||'—')}</div></div>
        <div><div class="form-label">Dossiercompletie</div>${pbarHtml(pct)}</div>
        <div><div class="form-label">E-mail</div><div style="font-size:13px;">${H(mw.email||'—')}</div></div>
        <div><div class="form-label">Telefoon</div><div style="font-size:13px;">${H(mw.telefoon||'—')}</div></div>

    </div>

function toggleBijlage(mwId, nr, el) {
  const b = DB.getBijlage(mwId, nr);
  const nieuw = !b.compleet;
  DB.saveBijlage(mwId, nr, { compleet: nieuw });
  el.classList.toggle('on', nieuw);
  el.innerHTML = nieuw ? '<i class="ti ti-check"></i>' : '';
  const statusEl = el.parentElement.querySelector('.tag');
  if (statusEl) {
    statusEl.className = `tag ${nieuw?'tag-green':'tag-amber'}`;
    statusEl.style.fontSize = '10px';
    statusEl.textContent = nieuw ? formatDate(new Date().toISOString().split('T')[0]) : 'Ontbreekt';
  }
  App.updateBadges();
}

let sigMwId = 0;
function initCanvasses() {
  ['sig-canvas','para-canvas'].forEach(id => {
    const c = document.getElementById(id);
    if (!c) return;
    const ctx = c.getContext('2d');
    c.width = c.parentElement.offsetWidth || 480;
    ctx.fillStyle = '#fafaf8'; ctx.fillRect(0,0,c.width,c.height);
    let drawing = false;
    const pos = e => { const r=c.getBoundingClientRect(); return e.touches ? {x:(e.touches[0].clientX-r.left)*(c.width/r.width),y:(e.touches[0].clientY-r.top)*(c.height/r.height)} : {x:(e.clientX-r.left)*(c.width/r.width),y:(e.clientY-r.top)*(c.height/r.height)}; };
    c.onmousedown = e => { drawing=true; const p=pos(e); ctx.beginPath(); ctx.moveTo(p.x,p.y); };
    c.onmousemove = e => { if(!drawing)return; const p=pos(e); const col=id==='sig-canvas'?(document.getElementById('sig-color')?.value||'#111'):(document.getElementById('para-color')?.value||'#111'); ctx.strokeStyle=col; ctx.lineWidth=2; ctx.lineCap='round'; ctx.lineTo(p.x,p.y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(p.x,p.y); };
    c.onmouseup = c.onmouseleave = () => drawing=false;
    c.ontouchstart = e => { e.preventDefault(); drawing=true; const p=pos(e); ctx.beginPath(); ctx.moveTo(p.x,p.y); };
    c.ontouchmove = e => { e.preventDefault(); if(!drawing)return; const p=pos(e); ctx.strokeStyle='#111'; ctx.lineWidth=2; ctx.lineCap='round'; ctx.lineTo(p.x,p.y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(p.x,p.y); };
    c.ontouchend = () => drawing=false;
  });
}

function clearCanvas(id) { const c=document.getElementById(id); if(!c)return; const ctx=c.getContext('2d'); ctx.clearRect(0,0,c.width,c.height); ctx.fillStyle='#fafaf8'; ctx.fillRect(0,0,c.width,c.height); }

function saveFromCanvas(type) {
  const mwId = parseInt(document.getElementById('sig-mw-select')?.value||0);
  if (!mwId) { Toast.show('Selecteer eerst een medewerker','warn'); return; }
  const c = document.getElementById(type==='hand'?'sig-canvas':'para-canvas');
  const data = c.toDataURL('image/png');
  const ht = DB.getHandtekening(mwId) || {};
  if (type==='hand') { DB.saveHandtekening(mwId, data, ht.paraaf||null); document.getElementById('hand-img').src=data; document.getElementById('hand-preview').classList.remove('hidden'); }
  else { DB.saveHandtekening(mwId, ht.hand||data, data); document.getElementById('para-img').src=data; document.getElementById('para-preview').classList.remove('hidden'); }
  Toast.show('Opgeslagen — automatisch in alle formulieren','success');
  App.updateBadges();
}

function handleSigUpload(type, e) {
  const mwId = parseInt(document.getElementById('sig-mw-select')?.value||0);
  if (!mwId) { Toast.show('Selecteer eerst een medewerker','warn'); return; }
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const data = ev.target.result;
    const ht = DB.getHandtekening(mwId) || {};
    if (type==='hand') { DB.saveHandtekening(mwId, data, ht.paraaf||null); document.getElementById('hand-img').src=data; document.getElementById('hand-preview').classList.remove('hidden'); document.getElementById('hand-upload-zone').classList.add('has-file'); document.getElementById('hand-upload-zone').innerHTML=`<i class="ti ti-check"></i><div>${file.name} geüpload</div>`; }
    else { DB.saveHandtekening(mwId, ht.hand||data, data); document.getElementById('para-img').src=data; document.getElementById('para-preview').classList.remove('hidden'); document.getElementById('para-upload-zone').classList.add('has-file'); document.getElementById('para-upload-zone').innerHTML=`<i class="ti ti-check"></i><div>${file.name} geüpload</div>`; }
    Toast.show('Opgeslagen — automatisch in alle formulieren','success');
    App.updateBadges();
  };
  reader.readAsDataURL(file);
}

const Export = {
  csv() {
    const mws = DB.getMedewerkers();
    const rows = [['Naam','Categorie','Fase','Start','Opdrachtgever','Handtekening','Dossier%','VCA Status']];
    mws.forEach(mw => {
      const il = DB.getInlener(mw.inlenerId);
      rows.push([mwNaam(mw),mw.cat,mw.fase||'—',mw.start,il?.naam||'—',mw.heeftHandtekening?'Ja':'Nee',DB.dossierCompletie(mw.id),DB.getCertificaten(mw.id).length>0?'Ja':'Nee']);
    });
    const csv = rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
    const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8'});
    const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`VCU_Compliance_${new Date().toISOString().split('T')[0]}.csv`; a.click();
    Toast.show('CSV geëxporteerd','success');
  }
};

function toggleFaseVeld() {

  const veld = document.getElementById('fase-veld');
  if (veld) veld.style.display = cat==='Uitzend' ? '' : 'none';
}

function saveMedewerker(id) {
  const vnaam = document.getElementById('mw-vnaam')?.value?.trim();

  if (!vnaam||!anaam) { Toast.show('Vul naam in','warn'); return; }
  const cat = document.getElementById('mw-cat')?.value;
  const fase = cat==='Uitzend' ? parseInt(document.getElementById('mw-fase')?.value||1) : null;
  const mw = {
    id: id||0, voornaam:vnaam, achternaam:anaam, cat,fase,
    start: document.getElementById('mw-start')?.value||new Date().toISOString().split('T')[0],
    inlenerId: parseInt(document.getElementById('mw-inlener')?.value||0)||null,
    functie: document.getElementById('mw-functie')?.value||'',
    email: document.getElementById('mw-email')?.value||'',
    telefoon: document.getElementById('mw-tel')?.value||'',
    bsn: document.getElementById('mw-bsn')?.value||'',
    idGecontroleerd: document.getElementById('mw-id')?.value==='1',
    vcuVoorlichting:false, heeftHandtekening:false, actief:true
  };
  if (id) { const bestaand=DB.getMedewerker(id); mw.heeftHandtekening=bestaand?.heeftHandtekening||false; mw.vcuVoorlichting=bestaand?.vcuVoorlichting||false; }
  DB.saveMedewerker(mw);
  Modal.close();
  Toast.show(id?'Medewerker bijgewerkt':'Medewerker aangemaakt — dossier gereed','success');
  App.navigate('medewerkers');
  App.updateBadges();
}

function handleCertUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  const zone = document.getElementById('cert-zone');
  zone.classList.add('has-file');
  zone.innerHTML = `<i class="ti ti-check"></i><div>${H(file.name)}</div>`;
  const reader = new FileReader();
  reader.onload = ev => { window._certBestand = {naam:file.name, data:ev.target.result}; };
  reader.readAsDataURL(file);
}

function saveCertificaatModal() {
  const mwId = parseInt(document.getElementById('cert-mw')?.value||0);

  Signalering.checkAll();
  App.navigate('certificaten');
  App.updateBadges();

  DB.saveEvaluatie({id:0, mwId:parseInt(document.getElementById('ev-mw')?.value||0), inlenerId:parseInt(document.getElementById('ev-il')?.value||0), datum:document.getElementById('ev-datum')?.value, scoreVeiligheid:parseInt(document.getElementById('ev-veilig')?.value), scorePBM:parseInt(document.getElementById('ev-pbm')?.value), scoreKwaliteit:parseInt(document.getElementById('ev-kwal')?.value), scoreWerkhouding:parseInt(document.getElementById('ev-werk')?.value), inlenerTevreden:document.getElementById('ev-it')?.value==='1', ukTevreden:document.getElementById('ev-ut')?.value==='1', verbeterpunten:document.getElementById('ev-verb')?.value});
  Modal.close();
  Toast.show('Evaluatie opgeslagen','success');
  App.navigate('evaluaties');
}

function saveInlenerModal(id) {
  const naam = document.getElementById('il-naam')?.value?.trim();
  if (!naam) { Toast.show('Vul bedrijfsnaam in','warn'); return; }
  DB.saveInlener({id:id||0, naam, kvk:document.getElementById('il-kvk')?.value, sector:document.getElementById('il-sector')?.value, contact:document.getElementById('il-contact')?.value, email:document.getElementById('il-email')?.value, telefoon:document.getElementById('il-tel')?.value, actief:true});
  Modal.close();
  Toast.show('Inlener opgeslagen','success');
  App.navigate('inleners');
}

</script>
<script>
// ── AFDRUKKEN & PDF ──
const Print = {

  _printHtml(html, titel) {
    const w = window.open('', '_blank', 'width=900,height=700');
    w.document.write(`<!DOCTYPE html><html lang="nl"><head><meta charset="UTF-8">
    <title>${titel}</title>
    <style>
      body { font-family: Arial, sans-serif; font-size: 12px; color: #111; margin: 20px; }
      h1 { font-size: 18px; margin-bottom: 4px; }
      h2 { font-size: 15px; margin: 16px 0 8px; border-bottom: 1px solid #ccc; padding-bottom: 4px; }
      h3 { font-size: 13px; margin: 12px 0 6px; }
      table { width: 100%; border-collapse: collapse; margin-bottom: 12px; font-size: 12px; }
      th { background: #f0f0f0; padding: 6px 8px; text-align: left; border: 1px solid #ccc; }
      td { padding: 6px 8px; border: 1px solid #ddd; }
      .header { display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 2px solid #185FA5; padding-bottom: 10px; margin-bottom: 16px; }
      .bedrijf { font-size: 11px; color: #555; }
      .tag { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 10px; font-weight: bold; }
      .t-green { background: #EAF3DE; color: #27500A; }
      .t-amber { background: #FAEEDA; color: #854F0B; }
      .t-red { background: #FCEBEB; color: #791F1F; }
      .t-blue { background: #E6F1FB; color: #0C447C; }
      .sig-box { border: 1px solid #ccc; height: 50px; width: 160px; display: inline-block; }
      .checkmark { font-size: 14px; }
      .footer { margin-top: 30px; border-top: 1px solid #ccc; padding-top: 8px; font-size: 10px; color: #888; }
      @media print { button { display: none; } }
    </style></head><body>
    <div class="header">
      <div>
        <h1>${titel}</h1>
        <div class="bedrijf">Solid Workforce B.V. · KVK 93619405 · Rivium 2E Straat, 2909 LG Capelle aan den IJssel</div>
        <div class="bedrijf">Datum: ${formatDate(new Date().toISOString())}</div>
      </div>
    </div>
    ${html}
    <div class="footer">VCU Managementsysteem — Solid Workforce B.V. · Gegenereerd op ${new Date().toLocaleString('nl-NL')}</div>
    <br><button onclick="window.print()" style="padding:8px 16px;background:#185FA5;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:13px;">Afdrukken / Opslaan als PDF</button>
    </body></html>`);
    w.document.close();
    setTimeout(() => w.print(), 500);
  },

  handboek() {
    const inst = DB.getInstellingen();
    const procs = PROCEDURES.map(p=>`
      <h3>${p.nr}. ${p.titel}</h3>
      <table><tr><th style="width:160px;">Frequentie</th><td>${p.freq}</td></tr>
      <tr><th>Verantwoordelijke</th><td>${p.verantw}</td></tr>
      <tr><th>Toelichting</th><td>${p.tekst}</td></tr></table>`).join('');
    const bijl = BIJLAGEN.map((b,i)=>`<tr><td>${i+1}</td><td>${b}</td><td>☐ Aanwezig</td></tr>`).join('');
    this._printHtml(`
      <h2>Inleiding</h2>
      <p>Solid Workforce B.V. is een uitzendorganisatie die zich richt op de veilige en gezonde inzet van flexkrachten binnen risicovolle sectoren. Dit handboek beschrijft de VGM-processen conform VCU-richtlijnen.</p>
      <h2>Deel 1 — Procedures (1 t/m 16)</h2>${procs}
      <h2>Deel 2 — Bijlagen (1 t/m 16)</h2>
      <table><thead><tr><th>#</th><th>Bijlage</th><th>Status</th></tr></thead><tbody>${bijl}</tbody></table>`,
      'VCU Handboek — Solid Workforce B.V.'
    );
  },

  handboekPDF() { this.handboek(); },

  handboekHoofdstuk(nr) {
    const p = PROCEDURES.find(x=>x.nr===nr);
    if (!p) return;
    this._printHtml(`<h2>${p.nr}. ${p.titel}</h2>
      <table><tr><th style="width:160px;">Frequentie</th><td>${p.freq}</td></tr>
      <tr><th>Verantwoordelijke</th><td>${p.verantw}</td></tr>
      <tr><th>Toelichting</th><td>${p.tekst}</td></tr></table>`,
      `VCU Handboek — Hoofdstuk ${p.nr}: ${p.titel}`
    );
  },

  dossierById(mwId) {
    if (!mwId) { Toast.show('Selecteer een medewerker','warn'); return; }
    const mw = DB.getMedewerker(mwId);
    if (!mw) return;
    this._printDossier(mw);
  },

  dossier() {
    const sel = document.getElementById('dossier-select');
    if (!sel?.value) { Toast.show('Selecteer een medewerker','warn'); return; }
    this.dossierById(parseInt(sel.value));
  },

  dossierPDF() { this.dossier(); },
  dossierPDFById(id) { this.dossierById(id); },

  _printDossier(mw) {
    const il = DB.getInlener(mw.inlenerId);
    const certs = DB.getCertificaten(mw.id);
    const bijl = DB.getBijlagen(mw.id);
    const ht = DB.getHandtekening(mw.id);
    const pct = DB.dossierCompletie(mw.id);

    const faseLabels = {1:'Fase 1 — Inleen (eerste periode)',2:'Fase 2 — Inleen',3:'Fase 3 — Bepaalde tijd',4:'Fase 4 — Onbepaalde tijd (vast)'};

    const bijlagenRows = BIJLAGEN.map((naam,i)=>{
      const b = bijl[i+1]||{};
      return `<tr><td>${i+1}</td><td>${naam}</td><td>${b.compleet?`<span class="tag t-green">✓ ${formatDate(b.datum)}</span>`:'<span class="tag t-amber">Ontbreekt</span>'}</td></tr>`;
    }).join('');

    const certRows = certs.length ? certs.map(c=>`<tr><td>${c.naam}</td><td>${c.nummer||'—'}</td><td>${formatDate(c.geldigTot)}</td><td>${daysDiff(c.geldigTot)<=30?'<span class="tag t-red">Verloopt binnenkort</span>':'<span class="tag t-green">Geldig</span>'}</td></tr>`).join('') : '<tr><td colspan="4">Geen certificaten geregistreerd</td></tr>';

    const sigHtml = ht ? `<img src="${ht.hand}" style="max-height:50px;border:1px solid #ccc;padding:4px;">` : '<div class="sig-box">Niet ingesteld</div>';
    const parHtml = ht?.paraaf ? `<img src="${ht.paraaf}" style="max-height:50px;border:1px solid #ccc;padding:4px;">` : '<div class="sig-box" style="width:80px;">Niet ingesteld</div>';

    this._printHtml(`
      <h2>Medewerkersdossier</h2>
      <table>
        <tr><th style="width:160px;">Naam</th><td>${mwNaam(mw)}</td><th style="width:120px;">BSN</th><td>${mw.bsn||'—'}</td></tr>
        <tr><th>Categorie</th><td>${mw.cat}</td><th>Contractfase</th><td>${mw.fase?faseLabels[mw.fase]:'N.v.t.'}</td></tr>
        <tr><th>Startdatum</th><td>${formatDate(mw.start)}</td><th>Opdrachtgever</th><td>${il?.naam||'—'}</td></tr>
        <tr><th>Functie</th><td>${mw.functie||'—'}</td><th>Dossiercompletie</th><td>${pct}%</td></tr>
        <tr><th>E-mail</th><td>${mw.email||'—'}</td><th>Telefoon</th><td>${mw.telefoon||'—'}</td></tr>
        <tr><th>ID gecontroleerd</th><td>${mw.idGecontroleerd?'<span class="tag t-green">✓ Ja</span>':'<span class="tag t-amber">Nee</span>'}</td>
            <th>VCU-voorlichting</th><td>${mw.vcuVoorlichting?'<span class="tag t-green">✓ Ja</span>':'<span class="tag t-amber">Nee</span>'}</td></tr>
      </table>

      ${mw.cat==='Uitzend'?`<h2>Contractfase (ABU/NBBU CAO)</h2>
      <p>Huidige fase: <strong>${faseLabels[mw.fase]||'—'}</strong> · Startdatum: ${formatDate(mw.start)} · Weken gewerkt: ${wekenGewerkt(mw.start)}</p>`:''}

      <h2>Handtekening & Paraaf</h2>
      <table><tr><th>Handtekening</th><th>Paraaf</th><th>Datum ingesteld</th></tr>
      <tr><td>${sigHtml}</td><td>${parHtml}</td><td>${ht?formatDate(ht.datum):'—'}</td></tr></table>

      <h2>Certificaten & Diploma's</h2>
      <table><thead><tr><th>Certificaat</th><th>Nummer</th><th>Geldig tot</th><th>Status</th></tr></thead>
      <tbody>${certRows}</tbody></table>

      <h2>VCU Bijlagen (16 stuks)</h2>
      <table><thead><tr><th style="width:30px;">#</th><th>Bijlage</th><th>Status</th></tr></thead>
      <tbody>${bijlagenRows}</tbody></table>

      <h2>Handtekeningen</h2>
      <table><tr>
        <td style="width:33%;text-align:center;"><div style="margin-bottom:4px;font-size:11px;font-weight:bold;">Medewerker</div>${sigHtml}<div style="font-size:10px;margin-top:4px;">${mwNaam(mw)}</div></td>
        <td style="width:33%;text-align:center;"><div style="margin-bottom:4px;font-size:11px;font-weight:bold;">Intercedent</div><div class="sig-box"></div></td>
        <td style="width:33%;text-align:center;"><div style="margin-bottom:4px;font-size:11px;font-weight:bold;">Directie</div><div class="sig-box"></div></td>
      </tr></table>`,
      `Personeelsdossier — ${mwNaam(mw)}`
    );
  },

  compliance() {
    const mws = DB.getMedewerkers();
    const rows = mws.map(mw=>{
      const pct = DB.dossierCompletie(mw.id);
      const certs = DB.getCertificaten(mw.id);
      const il = DB.getInlener(mw.inlenerId);
      return `<tr>
        <td>${mwNaam(mw)}</td>
        <td>${mw.cat}</td>
        <td>${mw.fase?`Fase ${mw.fase}`:'—'}</td>
        <td>${il?.naam||'—'}</td>
        <td>${mw.heeftHandtekening?'<span class="tag t-green">✓</span>':'<span class="tag t-amber">Nee</span>'}</td>
        <td>${pct===100?`<span class="tag t-green">100%</span>`:`<span class="tag t-amber">${pct}%</span>`}</td>
        <td>${certs.length>0?certs.map(c=>`${c.naam} (${formatDate(c.geldigTot)})`).join(', '):'Geen'}</td>
        <td>${pct===100&&mw.heeftHandtekening?'<span class="tag t-green">Compliant</span>':'<span class="tag t-amber">Onvolledig</span>'}</td>
      </tr>`;
    }).join('');
    this._printHtml(`
      <h2>Compliancerapportage</h2>
      <table><thead><tr><th>Naam</th><th>Categorie</th><th>Fase</th><th>Inlener</th><th>Handtek.</th><th>Dossier</th><th>Certificaten</th><th>VCU Status</th></tr></thead>
      <tbody>${rows}</tbody></table>`,
      'VCU Compliancerapportage — Solid Workforce B.V.'
    );
  }
};

</script>
<script>
// ── AUTOMATISCHE SIGNALERING ──
const Signalering = {
  checkAll() {
    this.checkCertificaten();
    this.checkContractfases();
    this.checkOntbrekendeBijlagen();
  },

  checkCertificaten() {
    const dagen = DB.getInstellingen().sigDagen || 30;
    DB.getCertificaten().forEach(c => {
      const d = daysDiff(c.geldigTot);
      if (d >= 0 && d <= dagen && !c.sigVerzonden) {
        const mw = DB.getMedewerker(c.mwId);
        DB.saveSignalering({ type:'Certificaat', medewerker: mwNaam(mw), omschrijving:`${c.naam} verloopt over ${d} dag(en) — ${formatDate(c.geldigTot)}`, urgentie: d <= 7 ? 'Kritiek' : 'Waarschuwing' });
        c.sigVerzonden = true;
        DB.saveCertificaat(c);
        this.verstuurKanalen(mwNaam(mw), `VCU: ${c.naam} verloopt over ${d} dagen`);
      }
    });
  },

  checkContractfases() {
    DB.getMedewerkers().filter(m=>m.cat==='Uitzend'&&(m.fase===1||m.fase===2)).forEach(mw => {
      const weken = wekenGewerkt(mw.start);
      if (weken >= 48 && weken <= 52) {
        const bestaand = DB.getSignaleringen(true).find(s=>s.type==='Contractfase'&&s.medewerker===mwNaam(mw));
        if (!bestaand) {
          DB.saveSignalering({ type:'Contractfase', medewerker: mwNaam(mw), omschrijving:`Fase 1/2 max bijna bereikt (${weken}/52 weken) — contractherziening vereist`, urgentie:'Waarschuwing' });
          this.verstuurKanalen(mwNaam(mw), `VCU: Contractfase overgang — ${mwNaam(mw)} (week ${weken}/52)`);
        }
      }
    });
  },

  checkOntbrekendeBijlagen() {
    DB.getMedewerkers().forEach(mw => {
      const pct = DB.dossierCompletie(mw.id);
      if (pct < 100) {
        const bestaand = DB.getSignaleringen(true).find(s=>s.type==='Dossier'&&s.medewerker===mwNaam(mw));
        if (!bestaand) {
          const ontbrekend = Math.round((1 - pct/100) * 16);
          DB.saveSignalering({ type:'Dossier', medewerker: mwNaam(mw), omschrijving:`${ontbrekend} bijlage(n) ontbreken in dossier (${pct}% compleet)`, urgentie:'Waarschuwing' });
        }
      }
    });
  },

  verstuurKanalen(naam, bericht) {
    const inst = DB.getInstellingen();
    // WhatsApp: open deep-link
    if (inst.sigWhatsapp && inst.whatsappNr) {
      const nr = inst.whatsappNr.replace(/\D/g,'');
      const url = `https://wa.me/${nr}?text=${encodeURIComponent(bericht)}`;
      // Sla op voor handmatig verzenden (geen auto-open om spam te voorkomen)
      console.log('[WhatsApp]', url);
    }
    // E-mail: mailto link
    if (inst.sigEmail && inst.vgmEmail) {
      const mailto = `mailto:${inst.vgmEmail}?subject=${encodeURIComponent('VCU Signalering: '+naam)}&body=${encodeURIComponent(bericht)}`;
      console.log('[Email]', mailto);
    }
  },

  // Toon WhatsApp link voor een specifieke signalering
  stuurWhatsApp(sigId) {
    const sig = DB.getSignaleringen(false).find(s=>s.id==sigId);
    if (!sig) return;
    const inst = DB.getInstellingen();
    const nr = (inst.whatsappNr||'').replace(/\D/g,'');
    if (!nr) { Toast.show('Geen WhatsApp nummer ingesteld in Instellingen','warn'); return; }
    const tekst = `VCU Signalering — ${sig.medewerker}\n${sig.omschrijving}\nUrgentie: ${sig.urgentie}`;
    window.open(`https://wa.me/${nr}?text=${encodeURIComponent(tekst)}`, '_blank');
  },

  stuurEmail(sigId) {
    const sig = DB.getSignaleringen(false).find(s=>s.id==sigId);
    if (!sig) return;
    const inst = DB.getInstellingen();
    const onderwerp = `VCU Signalering: ${sig.medewerker} — ${sig.type}`;
    const body = `Geachte VGM-functionaris,\n\nEr is een VCU signalering voor ${sig.medewerker}:\n\n${sig.omschrijving}\n\nUrgentie: ${sig.urgentie}\nDatum: ${formatDate(sig.datum)}\n\nMet vriendelijke groet,\nVCU Managementsysteem — ${inst.bedrijfsnaam}`;
    window.location.href = `mailto:${inst.vgmEmail}?subject=${encodeURIComponent(onderwerp)}&body=${encodeURIComponent(body)}`;
  }
};

</script>
